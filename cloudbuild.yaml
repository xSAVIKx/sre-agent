steps:
  # 1. Build SRE Chaos Monkey (Target App)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'build-chaos-monkey'
    waitFor: ['-']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud builds submit --config=app/cloudbuild.yaml \
          --region=${_GCP_REGION} \
          --substitutions=_GCP_REGION=${_GCP_REGION} .

  # 2. Build Inventory Agent
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'build-inventory-agent'
    waitFor: ['-']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud builds submit --config=inventory_agent/cloudbuild.yaml \
          --region=${_GCP_REGION} \
          --substitutions=_GCP_REGION=${_GCP_REGION} .
        INVENTORY_AGENT_URL=$(gcloud run services describe inventory-agent --region=${_GCP_REGION} --format="value(status.url)")
        gcloud run services update inventory-agent \
          --region=${_GCP_REGION} \
          --update-env-vars=INVENTORY_AGENT_URL="$INVENTORY_AGENT_URL"

  # 3. Build SRE Diagnostics Sub-Agent
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'build-sre-subagent'
    waitFor: ['build-inventory-agent']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        INVENTORY_AGENT_URL=$(gcloud run services describe inventory-agent --region=${_GCP_REGION} --format="value(status.url)")
        gcloud builds submit --config=sre_agent/cloudbuild.yaml \
          --region=${_GCP_REGION} \
          --substitutions=_GCP_REGION=${_GCP_REGION},_INVENTORY_AGENT_URL="$INVENTORY_AGENT_URL" .

  # 4. Build SRE Orchestrator Agent
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'build-orchestrator'
    waitFor: ['build-chaos-monkey', 'build-sre-subagent']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        TARGET_APP_URL=$(gcloud run services describe sre-chaos-monkey --region=${_GCP_REGION} --format="value(status.url)")
        SRE_SUB_AGENT_URL=$(gcloud run services describe sre-sub-agent --region=${_GCP_REGION} --format="value(status.url)")
        gcloud builds submit --config=agent/cloudbuild.yaml \
          --region=${_GCP_REGION} \
          --substitutions=_GCP_REGION=${_GCP_REGION},_TARGET_APP_URL="$TARGET_APP_URL",_SRE_AGENT_URL="$SRE_SUB_AGENT_URL" .

substitutions:
  _GCP_REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
