steps:
# 1. Build the docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/sre-repo/sre-chaos-monkey', '-f', 'app/Dockerfile', '.']

# 2. Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'sre-chaos-monkey'
  - '--image=$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/sre-repo/sre-chaos-monkey'
  - '--region=$_GCP_REGION'
  - '--service-account=sre-chaos-monkey-sa@$PROJECT_ID.iam.gserviceaccount.com'
  - '--port=8080'
  - '--allow-unauthenticated'
  - '--labels=demo=sre-agent-codelab'

images:
- '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/sre-repo/sre-chaos-monkey'

options:
  logging: CLOUD_LOGGING_ONLY
