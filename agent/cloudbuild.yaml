steps:
# 1. Build the docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/sre-repo/sre-agent', '-f', 'agent/Dockerfile', '.']

# 2. Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'sre-agent'
  - '--image=$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/sre-repo/sre-agent'
  - '--region=$_GCP_REGION'
  - '--service-account=sre-agent-sa@$PROJECT_ID.iam.gserviceaccount.com'
  - '--port=8080'
  - '--set-env-vars=MOCK_GCP=false,GCP_PROJECT=$PROJECT_ID,BACKEND_SERVICE_URL=$_TARGET_APP_URL'
  - '--allow-unauthenticated'
  - '--labels=demo=sre-agent-codelab'

images:
- '$_GCP_REGION-docker.pkg.dev/$PROJECT_ID/sre-repo/sre-agent'

options:
  logging: CLOUD_LOGGING_ONLY
