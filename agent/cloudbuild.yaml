steps:
# 1. Build the docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '-t'
  - '$_IMAGE'
  - '-f'
  - 'agent/Dockerfile'
  - '.'

# 2. Push the docker image (to ensure it is available for Cloud Run deploy step)
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'push'
  - '$_IMAGE'

# 3. Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'gcloud'
  args:
  - 'run'
  - 'deploy'
  - '$_SERVICE_NAME'
  - '--image=$_IMAGE'
  - '--region=$_GCP_REGION'
  - '--service-account=$_SA_NAME@$PROJECT_ID.iam.gserviceaccount.com'
  - '--port=8080'
  - '--set-env-vars=MOCK_GCP=false,GCP_PROJECT=$PROJECT_ID,BACKEND_SERVICE_URL=$_TARGET_APP_URL'
  - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
  - '--allow-unauthenticated'
  - '--labels=demo=sre-agent-codelab'

images:
- '$_IMAGE'

substitutions:
  _SERVICE_NAME: 'sre-agent'
  _SA_NAME: 'sre-agent-sa'
  _REPO_NAME: 'sre-repo'
  _GCP_REGION: 'us-central1'
  _TARGET_APP_URL: ''
  _IMAGE: '${_GCP_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/${_SERVICE_NAME}'

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true
