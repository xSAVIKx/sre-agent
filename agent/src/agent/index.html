<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity SRE Chat Control</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛸</text></svg>">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            color-scheme: dark;
            --bg-primary: #0b0f19;
            --bg-glass: rgba(17, 25, 40, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --terminal-bg: #05070c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --danger: #ef4444;
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.08) 0%, transparent 40%);
        }

        .app-container {
            width: 100%;
            max-width: 1150px;
            height: 90vh;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            display: flex;
            flex-direction: row;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        /* Header Styling */
        .app-header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 15, 30, 0.4);
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            font-size: 24px;
        }

        .header-title h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-title p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .agent-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.06);
            border: 1px solid rgba(16, 185, 129, 0.15);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 500;
            color: var(--success);
            box-shadow: 0 0 15px var(--success-glow);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Chat History Area */
        .chat-history {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-history::-webkit-scrollbar {
            width: 8px;
        }

        .chat-history::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-history::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 99px;
        }

        .chat-history::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Messages */
        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.agent {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-row.user .message-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
        }

        .message-row.agent .message-bubble {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-bottom-left-radius: 4px;
            width: 100%;
            max-width: 800px;
        }

        /* A2UI Component Styles */
        .a2ui-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .a2ui-header {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
            margin-bottom: 4px;
        }

        .a2ui-alert {
            padding: 14px 18px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left-width: 4px;
            color: var(--text-main);
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .a2ui-alert.error {
            border-left-color: var(--danger);
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.15);
        }
        .a2ui-alert.warning {
            border-left-color: var(--warning);
            background: rgba(245, 158, 11, 0.08);
            border-color: rgba(245, 158, 11, 0.15);
        }
        .a2ui-alert.success {
            border-left-color: var(--success);
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.15);
        }
        .a2ui-alert-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 15px;
        }
        .a2ui-alert-text {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .a2ui-text {
            color: var(--text-main);
            font-size: 15px;
        }

        /* Markdown rendering styles */
        .a2ui-text p, .a2ui-alert-text p, .a2ui-section-content p {
            margin-bottom: 12px;
            line-height: 1.6;
        }
        .a2ui-text p:last-child, .a2ui-alert-text p:last-child, .a2ui-section-content p:last-child {
            margin-bottom: 0;
        }
        .a2ui-text ul, .a2ui-text ol, .a2ui-section-content ul, .a2ui-section-content ol {
            margin: 12px 0;
            padding-left: 20px;
        }
        .a2ui-text li, .a2ui-section-content li {
            margin-bottom: 6px;
            line-height: 1.5;
        }
        .a2ui-text code, .a2ui-alert-text code, .a2ui-section-content code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #f43f5e;
        }
        .a2ui-text pre, .a2ui-section-content pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 14px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 14px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .a2ui-text pre code, .a2ui-section-content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            color: inherit;
        }
        .a2ui-text h1, .a2ui-text h2, .a2ui-text h3, .a2ui-section-content h1, .a2ui-section-content h2, .a2ui-section-content h3 {
            margin: 18px 0 10px 0;
            font-weight: 600;
            color: var(--text-main);
        }
        .a2ui-text h1, .a2ui-section-content h1 { font-size: 1.3em; }
        .a2ui-text h2, .a2ui-section-content h2 { font-size: 1.2em; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 4px; }
        .a2ui-text h3, .a2ui-section-content h3 { font-size: 1.1em; }
        .a2ui-text table, .a2ui-section-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 14px 0;
            font-size: 0.95em;
        }
        .a2ui-text th, .a2ui-text td, .a2ui-section-content th, .a2ui-section-content td {
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 12px;
            text-align: left;
        }
        .a2ui-text th, .a2ui-section-content th {
            background: rgba(255, 255, 255, 0.04);
            font-weight: 600;
        }

        /* Rich Component: Card */
        .a2ui-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
        }

        .a2ui-card-title {
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .a2ui-card-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .a2ui-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .a2ui-field-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .a2ui-field-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text-main);
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* Rich Component: Section */
        .a2ui-section {
            background: rgba(99, 102, 241, 0.02);
            border-left: 3px solid var(--primary);
            padding: 14px 16px;
            border-radius: 0 8px 8px 0;
        }

        .a2ui-section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .a2ui-section-content {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Rich Component: Code Terminal Block */
        .a2ui-codeblock {
            background-color: var(--terminal-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .a2ui-codeblock-header {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 16px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .a2ui-codeblock-dots {
            display: flex;
            gap: 6px;
        }

        .code-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .code-dot.red { background-color: #ff5f56; }
        .code-dot.yellow { background-color: #ffbd2e; }
        .code-dot.green { background-color: #27c93f; }

        .a2ui-codeblock-body {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 16px;
            color: #a7f3d0;
            white-space: pre-wrap;
            overflow-x: auto;
            line-height: 1.6;
        }

        /* Rich Component: List */
        .a2ui-list {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .a2ui-list-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .a2ui-list-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .a2ui-list-item {
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .a2ui-list-item-bullet {
            color: var(--success);
            font-weight: bold;
        }

        /* Streaming Elements styling */
        .agent-thinking-box {
            background: rgba(255, 255, 255, 0.02);
            border-left: 2px dashed var(--primary);
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-muted);
            white-space: pre-wrap;
            animation: fadeIn 0.3s ease-out;
        }

        .agent-thinking-title {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .agent-text-stream {
            color: var(--text-main);
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* Input Controls Area */
        .chat-input-area {
            padding: 24px 32px 32px;
            border-top: 1px solid var(--border-glass);
            background: rgba(10, 15, 30, 0.3);
        }

        .input-form {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .text-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 16px 20px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .text-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25), inset 0 2px 4px rgba(0,0,0,0.2);
            background: rgba(0, 0, 0, 0.45);
        }

        .text-input::placeholder {
            color: #4b5563;
        }

        .send-button {
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 14px;
            padding: 0 28px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
        }

        .send-button:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        .send-button:active:not(:disabled) {
            transform: translateY(1px);
        }

        .send-button:disabled {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            color: #4b5563;
            cursor: not-allowed;
            box-shadow: none;
        }

        .send-button.stop-mode {
            background: linear-gradient(135deg, var(--danger) 0%, #b91c1c 100%);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .send-button.stop-mode:hover:not(:disabled) {
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.45);
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: rgba(10, 15, 30, 0.4);
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-header h2 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .new-session-btn {
            background: rgba(99, 102, 241, 0.08);
            border: 1px dashed var(--primary);
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .new-session-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sessions-list::-webkit-scrollbar {
            width: 6px;
        }

        .sessions-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .sessions-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 99px;
        }

        .sessions-list::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .session-item {
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .session-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-glass);
        }

        .session-item.active {
            background: rgba(99, 102, 241, 0.12);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }

        .session-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        .session-item:hover .edit-title-btn,
        .session-item:hover .delete-session-btn,
        .edit-title-btn:focus-visible,
        .delete-session-btn:focus-visible,
        .edit-title-btn:focus,
        .delete-session-btn:focus {
            opacity: 1 !important;
        }
        .edit-title-btn:hover {
            color: var(--primary) !important;
        }
        .delete-session-btn:hover {
            color: var(--danger) !important;
        }

        .main-chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* Focus rings */
        button:focus-visible, 
        .session-item:focus-visible,
        .session-select-btn:focus-visible,
        input:focus-visible,
        a:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Skip link */
        .skip-link {
            position: absolute;
            top: -100px;
            left: 20px;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 2000;
            text-decoration: none;
            font-weight: 500;
            transition: top 0.2s ease;
        }
        .skip-link:focus-visible, .skip-link:focus {
            top: 20px;
            outline: none;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        /* Hidden screen reader helpers */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* Mobile Menu Buttons & Overlay */
        .sidebar-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .sidebar-toggle:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .sidebar-close-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
        }
        .sidebar-close-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }
        .sidebar-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(5, 7, 12, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 998;
            transition: opacity 0.3s ease;
        }
        .sidebar-overlay.visible {
            display: block;
        }

        /* Session list button styling */
        .session-select-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            flex: 1;
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0;
        }

        /* PM download button styles */
        .download-pm-btn {
            margin-top: 12px;
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            font-size: 14px;
            box-shadow: 0 4px 12px var(--success-glow);
            transition: all 0.2s ease;
            outline: none;
        }
        .download-pm-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35);
            filter: brightness(1.05);
        }
        .download-pm-btn:active {
            transform: translateY(1px);
        }
        .download-pm-btn:focus-visible {
            outline: 2px solid var(--success);
            outline-offset: 2px;
        }

        /* Responsive Breakpoint: Tablet (768px - 1024px) */
        @media (max-width: 1024px) {
            .app-container {
                height: 100vh;
                width: 100vw;
                max-width: 100%;
                border-radius: 0;
                border: none;
            }
            .sidebar {
                width: 240px;
            }
        }

        /* Responsive Breakpoint: Mobile (< 768px) */
        @media (max-width: 768px) {
            .sidebar-toggle {
                display: block;
            }
            .sidebar-close-btn {
                display: block;
            }
            .sidebar {
                position: absolute;
                top: 0;
                left: -280px;
                width: 280px;
                height: 100%;
                z-index: 999;
                background: #0b0f19;
                transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .sidebar.open {
                left: 0;
            }
            .chat-history {
                padding: 16px 20px;
                gap: 16px;
            }
            .chat-input-area {
                padding: 16px 20px 20px;
            }
            .app-header {
                padding: 14px 20px;
            }
            .message-bubble {
                max-width: 95%;
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <a href="#chatHistory" class="skip-link">Skip to chat content</a>

    <div class="app-container">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar for Sessions -->
        <aside class="sidebar" role="complementary" aria-label="Diagnostic Sessions">
            <div class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <h2>Diagnostic Sessions</h2>
                    <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close sessions menu">✕</button>
                </div>
                <button class="new-session-btn" id="newSessionBtn">+ New Chat</button>
            </div>
            <ul class="sessions-list" id="sessionsList" role="list">
                <!-- Session items loaded dynamically -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <div class="main-chat-area">
            <!-- Header -->
            <header class="app-header">
                <div class="header-title-container">
                    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open sessions menu">☰</button>
                    <div class="header-logo">🛸</div>
                    <div class="header-title">
                        <h1>Antigravity SRE Control</h1>
                        <p>Stateless Diagnostics Loop & A2UI Render</p>
                    </div>
                </div>
                
                <div class="agent-status" role="status">
                    <div class="status-dot"></div>
                    <span>Agent Active</span>
                </div>
            </header>

            <!-- Message History -->
            <main class="chat-history" id="chatHistory">
                <!-- Initial Agent Message -->
                <div class="message-row agent">
                    <div class="message-bubble">
                        <div class="a2ui-container">
                            <div class="a2ui-text">System initialized. I am ready to monitor systems and analyze correlated telemetry. You can trigger an incident diagnostics report at any time.</div>
                        </div>
                    </div>
                </div>
            </main>

            <!-- Input Section -->
            <footer class="chat-input-area">
                <form class="input-form" id="inputForm">
                    <div class="input-wrapper">
                        <label for="textInput" class="sr-only">Message prompt</label>
                        <input type="text" 
                               id="textInput" 
                               class="text-input" 
                               placeholder="Describe the incident (e.g. Gateway database timeouts)..." 
                               autocomplete="off" 
                               aria-label="Message prompt"
                               required>
                    </div>
                    <button type="submit" class="send-button" id="sendBtn">
                        <span>Send</span>
                    </button>
                </form>
            </footer>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const inputForm = document.getElementById('inputForm');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const sessionsList = document.getElementById('sessionsList');
        const newSessionBtn = document.getElementById('newSessionBtn');

        // Stateful conversation tracking
        let activeConversationId = null;
        let currentAbortController = null;

        // Parse markdown text using marked.js for rich HTML display
        function formatMarkdownInline(text) {
            if (!text) return "";
            if (window.marked && window.marked.parse) {
                try {
                    return marked.parse(text);
                } catch (e) {
                    console.error("Failed to parse markdown with marked.js:", e);
                }
            }
            return text
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code style="font-family: \'JetBrains Mono\', monospace; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-size: 0.9em;">$1</code>');
        }

        // Render an A2UI payload into HTML components
        function renderA2UIContainer(payload) {
            const containerDiv = document.createElement('div');
            containerDiv.className = 'a2ui-container';

            if (!payload || !payload.components) {
                return containerDiv;
            }

            payload.components.forEach(comp => {
                switch (comp.type) {
                    case 'alert':
                        const alertDiv = document.createElement('div');
                        alertDiv.className = `a2ui-alert ${comp.level || 'info'}`;
                        
                        const alertTitle = document.createElement('div');
                        alertTitle.className = 'a2ui-alert-title';
                        
                        let icon = 'ℹ️';
                        if (comp.level === 'error') icon = '🚨';
                        else if (comp.level === 'warning') icon = '⚠️';
                        else if (comp.level === 'success') icon = '✅';
                        
                        alertTitle.innerHTML = `<span>${icon}</span> <span>${formatMarkdownInline(comp.title || 'Notification')}</span>`;
                        alertDiv.appendChild(alertTitle);
                        
                        if (comp.text) {
                            const alertText = document.createElement('div');
                            alertText.className = 'a2ui-alert-text';
                            alertText.innerHTML = formatMarkdownInline(comp.text);
                            alertDiv.appendChild(alertText);
                        }
                        
                        containerDiv.appendChild(alertDiv);
                        break;

                    case 'header':
                        const header = document.createElement('div');
                        header.className = 'a2ui-header';
                        header.innerHTML = formatMarkdownInline(comp.text);
                        containerDiv.appendChild(header);
                        break;

                    case 'text':
                        const text = document.createElement('div');
                        text.className = 'a2ui-text';
                        text.innerHTML = formatMarkdownInline(comp.content);
                        containerDiv.appendChild(text);
                        break;

                    case 'card':
                        const card = document.createElement('div');
                        card.className = 'a2ui-card';
                        
                        const cardTitle = document.createElement('div');
                        cardTitle.className = 'a2ui-card-title';
                        cardTitle.innerText = comp.title || "Details";
                        card.appendChild(cardTitle);

                        const fieldsContainer = document.createElement('div');
                        fieldsContainer.className = 'a2ui-card-fields';

                        if (comp.fields) {
                            comp.fields.forEach(field => {
                                const fieldDiv = document.createElement('div');
                                fieldDiv.className = 'a2ui-field';

                                const label = document.createElement('div');
                                label.className = 'a2ui-field-label';
                                label.innerText = field.label;

                                const val = document.createElement('div');
                                val.className = 'a2ui-field-value';
                                val.innerText = field.value;

                                fieldDiv.appendChild(label);
                                fieldDiv.appendChild(val);
                                fieldsContainer.appendChild(fieldDiv);
                            });
                        }

                        card.appendChild(fieldsContainer);
                        containerDiv.appendChild(card);
                        break;

                    case 'section':
                        const section = document.createElement('div');
                        section.className = 'a2ui-section';

                        const secTitle = document.createElement('div');
                        secTitle.className = 'a2ui-section-title';
                        secTitle.innerHTML = formatMarkdownInline(comp.title);
                        section.appendChild(secTitle);

                        const secContent = document.createElement('div');
                        secContent.className = 'a2ui-section-content';
                        secContent.innerHTML = formatMarkdownInline(comp.content);
                        section.appendChild(secContent);

                        containerDiv.appendChild(section);
                        break;

                    case 'code_block':
                        const cb = document.createElement('div');
                        cb.className = 'a2ui-codeblock';

                        const cbHeader = document.createElement('div');
                        cbHeader.className = 'a2ui-codeblock-header';
                        
                        const dots = document.createElement('div');
                        dots.className = 'a2ui-codeblock-dots';
                        dots.innerHTML = '<div class="code-dot red"></div><div class="code-dot yellow"></div><div class="code-dot green"></div>';
                        
                        const titleSpan = document.createElement('span');
                        titleSpan.innerText = comp.title || "Diagnostics Log";
                        
                        cbHeader.appendChild(dots);
                        cbHeader.appendChild(titleSpan);
                        cb.appendChild(cbHeader);

                        const cbBody = document.createElement('div');
                        cbBody.className = 'a2ui-codeblock-body';
                        cbBody.innerText = comp.code;
                        cb.appendChild(cbBody);

                        containerDiv.appendChild(cb);
                        break;

                    case 'list':
                        const list = document.createElement('div');
                        list.className = 'a2ui-list';

                        const listTitle = document.createElement('div');
                        listTitle.className = 'a2ui-list-title';
                        listTitle.innerHTML = formatMarkdownInline(comp.title);
                        list.appendChild(listTitle);

                        const listItems = document.createElement('ul');
                        listItems.className = 'a2ui-list-items';

                        if (comp.items) {
                            comp.items.forEach(item => {
                                const li = document.createElement('li');
                                li.className = 'a2ui-list-item';
                                li.innerHTML = `<span class="a2ui-list-item-bullet">✓</span> <span>${formatMarkdownInline(item)}</span>`;
                                listItems.appendChild(li);
                            });
                        }

                        list.appendChild(listItems);
                        containerDiv.appendChild(list);
                        break;

                    case 'download_button':
                        const btn = document.createElement('button');
                        btn.className = 'download-pm-btn';
                        btn.innerHTML = `<span style="margin-right:6px;" aria-hidden="true">📥</span> ${comp.text || 'Download Post-Mortem'}`;
                        btn.onclick = () => {
                            const blob = new Blob([comp.content], { type: 'text/markdown' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = comp.filename || 'post_mortem.md';
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        };
                        containerDiv.appendChild(btn);
                        break;
                }
            });

            return containerDiv;
        }

        // Add message row to history UI
        function appendMessageRow(sender, element) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.appendChild(element);
            
            row.appendChild(bubble);
            chatHistory.appendChild(row);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return bubble;
        }

        // Submit message handler
        inputForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // If we are currently processing a request, click acts as a Stop action
            if (currentAbortController) {
                currentAbortController.abort();
                return;
            }

            const prompt = textInput.value.trim();
            if (!prompt) return;

            // Clear input and disable text field
            textInput.value = '';
            textInput.disabled = true;

            // Initialize AbortController for this request
            currentAbortController = new AbortController();

            // Style send button as stop button
            const originalSendBtnHTML = sendBtn.innerHTML;
            sendBtn.innerHTML = '<span>Stop</span>';
            sendBtn.classList.add('stop-mode');
            sendBtn.disabled = false; // Must remain clickable!

            // 1. Render User Message bubble
            const userTextDiv = document.createElement('div');
            userTextDiv.className = 'a2ui-text';
            userTextDiv.innerText = prompt;
            const userContainer = document.createElement('div');
            userContainer.className = 'a2ui-container';
            userContainer.appendChild(userTextDiv);
            appendMessageRow('user', userContainer);

            // Create agent response elements ahead of time
            const agentBubbleInner = document.createElement('div');
            agentBubbleInner.className = 'a2ui-container';

            // Thinking Container
            const thinkingBox = document.createElement('div');
            thinkingBox.className = 'agent-thinking-box';
            thinkingBox.style.display = 'none'; // hidden initially
            
            const thinkingTitle = document.createElement('div');
            thinkingTitle.className = 'agent-thinking-title';
            thinkingTitle.innerHTML = '<span>💭</span> <span>Thinking Process...</span>';
            thinkingBox.appendChild(thinkingTitle);

            const thinkingContent = document.createElement('div');
            thinkingBox.appendChild(thinkingContent);
            agentBubbleInner.appendChild(thinkingBox);

            // Text stream container
            const textStreamBox = document.createElement('div');
            textStreamBox.className = 'agent-text-stream';
            agentBubbleInner.appendChild(textStreamBox);

            // Append agent bubble and get a handle to it
            const agentBubble = appendMessageRow('agent', agentBubbleInner);

            try {
                // 2. Fetch SRE Agent response with stream
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        conversation_id: activeConversationId,
                    }),
                    signal: currentAbortController.signal
                });

                if (!response.ok) {
                    throw new Error(`HTTP Error ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let buffer = "";
                let finalMarkdown = "";
                let finalA2UI = null;
                let limitReachedObj = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    // Keep the last partial line in buffer
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed) continue;

                        if (trimmed.startsWith("data: ")) {
                            const dataStr = trimmed.slice(6);
                            try {
                                const event = JSON.parse(dataStr);
                                
                                if (event.type === "start") {
                                    if (event.conversation_id) {
                                        const prevId = activeConversationId;
                                        activeConversationId = event.conversation_id;
                                        if (prevId !== event.conversation_id) {
                                            loadSessions();
                                            const url = new URL(window.location);
                                            url.searchParams.set('sessionId', event.conversation_id);
                                            window.history.pushState({}, '', url);
                                        }
                                    }
                                } else if (event.type === "thought") {
                                    thinkingBox.style.display = 'block';
                                    thinkingContent.innerText += event.text;
                                    chatHistory.scrollTop = chatHistory.scrollHeight;
                                } else if (event.type === "chunk") {
                                    textStreamBox.innerText += event.text;
                                    chatHistory.scrollTop = chatHistory.scrollHeight;
                                } else if (event.type === "limit_reached") {
                                    limitReachedObj = event;
                                } else if (event.type === "done") {
                                    finalMarkdown = event.response;
                                    finalA2UI = event.response_a2ui;
                                } else if (event.type === "error") {
                                    throw new Error(event.detail);
                                }
                            } catch (parseErr) {
                                console.error("Error parsing SSE event:", parseErr, trimmed);
                            }
                        }
                    }
                }

                // Stream ended. Transform the bubble!
                agentBubble.innerHTML = ''; // Clear temporary stream containers
                
                if (limitReachedObj) {
                    const res = limitReachedObj.response_a2ui;
                    if (res) {
                        agentBubble.appendChild(renderA2UIContainer(res));
                    } else {
                        const fallbackTextDiv = document.createElement('div');
                        fallbackTextDiv.className = 'a2ui-text';
                        fallbackTextDiv.innerText = limitReachedObj.response || "Suspended due to tool limit.";
                        const fallbackContainer = document.createElement('div');
                        fallbackContainer.className = 'a2ui-container';
                        fallbackContainer.appendChild(fallbackTextDiv);
                        agentBubble.appendChild(fallbackContainer);
                    }

                    // Append interactive decision panel
                    const panel = document.createElement('div');
                    panel.className = 'limit-reached-panel';
                    panel.style.marginTop = '15px';
                    panel.style.padding = '15px';
                    panel.style.background = 'rgba(245, 158, 11, 0.05)';
                    panel.style.borderRadius = '12px';
                    panel.style.border = '1px solid rgba(245, 158, 11, 0.2)';
                    
                    const title = document.createElement('div');
                    title.style.color = 'var(--warning)';
                    title.style.fontWeight = '600';
                    title.style.marginBottom = '8px';
                    title.style.fontSize = '15px';
                    title.style.display = 'flex';
                    title.style.alignItems = 'center';
                    title.style.gap = '8px';
                    title.innerHTML = '<span>⚠️</span> <span>Tool execution limit reached (6 tools)</span>';
                    panel.appendChild(title);

                    const desc = document.createElement('div');
                    desc.style.fontSize = '13.5px';
                    desc.style.color = 'var(--text-muted)';
                    desc.style.marginBottom = '15px';
                    desc.style.lineHeight = '1.4';
                    desc.innerText = 'To prevent infinite loops, processing has paused. Choose how you want to proceed:';
                    panel.appendChild(desc);

                    const btnGroup = document.createElement('div');
                    btnGroup.style.display = 'flex';
                    btnGroup.style.gap = '10px';
                    btnGroup.style.flexWrap = 'wrap';

                    const continueBtn = document.createElement('button');
                    continueBtn.className = 'send-button';
                    continueBtn.style.padding = '8px 16px';
                    continueBtn.style.fontSize = '13px';
                    continueBtn.style.height = 'auto';
                    continueBtn.style.width = 'auto';
                    continueBtn.style.background = 'rgba(245, 158, 11, 0.15)';
                    continueBtn.style.border = '1px solid var(--warning)';
                    continueBtn.style.color = 'var(--warning)';
                    continueBtn.style.borderRadius = '8px';
                    continueBtn.innerText = '🔄 Continue diagnostics';
                    continueBtn.addEventListener('click', () => {
                        panel.remove();
                        // Automatically submit a continuation prompt
                        textInput.value = 'Please continue the investigation.';
                        inputForm.dispatchEvent(new Event('submit'));
                    });
                    btnGroup.appendChild(continueBtn);

                    const clarifyBtn = document.createElement('button');
                    clarifyBtn.className = 'send-button';
                    clarifyBtn.style.padding = '8px 16px';
                    clarifyBtn.style.fontSize = '13px';
                    clarifyBtn.style.height = 'auto';
                    clarifyBtn.style.width = 'auto';
                    clarifyBtn.style.background = 'rgba(255, 255, 255, 0.05)';
                    clarifyBtn.style.border = '1px solid var(--border-glass)';
                    clarifyBtn.style.color = 'var(--text-main)';
                    clarifyBtn.style.borderRadius = '8px';
                    clarifyBtn.innerText = '🔍 Refine scope / clarify';
                    clarifyBtn.addEventListener('click', () => {
                        panel.remove();
                        textInput.value = 'Focus search on service: [enter service name]';
                        textInput.focus();
                        const len = textInput.value.length;
                        textInput.setSelectionRange(len - 20, len);
                    });
                    btnGroup.appendChild(clarifyBtn);

                    const stopBtn = document.createElement('button');
                    stopBtn.className = 'send-button';
                    stopBtn.style.padding = '8px 16px';
                    stopBtn.style.fontSize = '13px';
                    stopBtn.style.height = 'auto';
                    stopBtn.style.width = 'auto';
                    stopBtn.style.background = 'rgba(239, 68, 68, 0.15)';
                    stopBtn.style.border = '1px solid var(--danger)';
                    stopBtn.style.color = 'var(--danger)';
                    stopBtn.style.borderRadius = '8px';
                    stopBtn.innerText = '➕ Start new chat';
                    stopBtn.addEventListener('click', () => {
                        newSession();
                    });
                    btnGroup.appendChild(stopBtn);

                    panel.appendChild(btnGroup);
                    agentBubble.appendChild(panel);
                } else if (finalA2UI) {
                    const finalA2UIDiv = renderA2UIContainer(finalA2UI);
                    agentBubble.appendChild(finalA2UIDiv);
                } else {
                    // Fallback to text if missing A2UI payload
                    const fallbackTextDiv = document.createElement('div');
                    fallbackTextDiv.className = 'a2ui-text';
                    fallbackTextDiv.innerText = finalMarkdown || "No response received.";
                    const fallbackContainer = document.createElement('div');
                    fallbackContainer.className = 'a2ui-container';
                    fallbackContainer.appendChild(fallbackTextDiv);
                    agentBubble.appendChild(fallbackContainer);
                }
                chatHistory.scrollTop = chatHistory.scrollHeight;

            } catch (err) {
                // Clear the bubble and render Error bubble
                agentBubble.innerHTML = '';
                const errTextDiv = document.createElement('div');
                errTextDiv.className = 'a2ui-text';
                
                // Render custom message if user manually cancelled
                const isAborted = err.name === 'AbortError';
                if (isAborted) {
                    errTextDiv.style.color = 'var(--text-muted)';
                    errTextDiv.innerText = '🛑 Diagnostic processing forcefully cancelled by user.';
                } else {
                    errTextDiv.style.color = 'var(--danger)';
                    errTextDiv.innerText = `Error contacting agent: ${err.message}`;
                }

                const errContainer = document.createElement('div');
                errContainer.className = 'a2ui-container';
                errContainer.appendChild(errTextDiv);
                agentBubble.appendChild(errContainer);
                chatHistory.scrollTop = chatHistory.scrollHeight;
            } finally {
                // Clear AbortController reference
                currentAbortController = null;

                // Re-enable text input
                textInput.disabled = false;

                // Revert send button styling
                sendBtn.innerHTML = originalSendBtnHTML;
                sendBtn.classList.remove('stop-mode');
                textInput.focus();
                
                // Refresh sessions to show any updated timestamps or prompts
                loadSessions();
            }
        });

        // Sidebar sessions rendering and loading
        function renderSessionItem(session) {
            const item = document.createElement('li');
            item.className = 'session-item';
            if (session.conversation_id === activeConversationId) {
                item.classList.add('active');
            }
            item.dataset.id = session.conversation_id;

            const header = document.createElement('div');
            header.className = 'session-header';
            header.style.display = 'flex';
            header.style.justifyContent = 'space-between';
            header.style.alignItems = 'center';
            header.style.width = '100%';
            header.style.gap = '8px';

            const selectBtn = document.createElement('button');
            selectBtn.className = 'session-select-btn';
            selectBtn.innerText = session.prompt || 'Untitled Session';
            selectBtn.setAttribute('aria-label', `Select session: ${session.prompt || 'Untitled Session'}`);
            selectBtn.addEventListener('click', () => {
                if (currentAbortController) {
                    currentAbortController.abort();
                }
                selectSession(session.conversation_id);
            });
            header.appendChild(selectBtn);

            const actionContainer = document.createElement('div');
            actionContainer.className = 'session-actions';
            actionContainer.style.display = 'flex';
            actionContainer.style.gap = '6px';
            actionContainer.style.alignItems = 'center';

            const editBtn = document.createElement('button');
            editBtn.className = 'edit-title-btn';
            editBtn.innerHTML = '✏️';
            editBtn.setAttribute('aria-label', 'Edit session title');
            editBtn.title = 'Edit session title';
            editBtn.style.background = 'none';
            editBtn.style.border = 'none';
            editBtn.style.color = 'var(--text-muted)';
            editBtn.style.cursor = 'pointer';
            editBtn.style.fontSize = '12px';
            editBtn.style.opacity = '0';
            editBtn.style.transition = 'opacity 0.2s, color 0.2s';
            editBtn.style.padding = '2px';
            actionContainer.appendChild(editBtn);

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-session-btn';
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.setAttribute('aria-label', 'Delete session');
            deleteBtn.title = 'Delete session';
            deleteBtn.style.background = 'none';
            deleteBtn.style.border = 'none';
            deleteBtn.style.color = 'var(--text-muted)';
            deleteBtn.style.cursor = 'pointer';
            deleteBtn.style.fontSize = '12px';
            deleteBtn.style.opacity = '0';
            deleteBtn.style.transition = 'opacity 0.2s, color 0.2s';
            deleteBtn.style.padding = '2px';
            actionContainer.appendChild(deleteBtn);

            header.appendChild(actionContainer);
            item.appendChild(header);

            const meta = document.createElement('div');
            meta.className = 'session-meta';
            
            let dateStr = "Recent";
            if (session.updated_at) {
                try {
                    const date = new Date(session.updated_at);
                    dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                } catch (e) {
                    dateStr = session.updated_at;
                }
            }
            meta.innerText = dateStr;
            item.appendChild(meta);

            // Forward click on list item to select button
            item.addEventListener('click', (e) => {
                if (!editBtn.contains(e.target) && !deleteBtn.contains(e.target) && !actionContainer.contains(e.target)) {
                    selectBtn.click();
                }
            });

            editBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'session-title-input';
                input.value = selectBtn.innerText;
                input.style.flex = '1';
                input.style.background = 'rgba(255, 255, 255, 0.05)';
                input.style.border = '1px solid var(--primary)';
                input.style.borderRadius = '6px';
                input.style.color = 'var(--text-main)';
                input.style.fontSize = '14px';
                input.style.padding = '2px 6px';
                input.style.outline = 'none';
                
                header.replaceChild(input, selectBtn);
                actionContainer.style.display = 'none';
                input.focus();
                input.select();
                
                const saveTitle = async () => {
                    const newTitle = input.value.trim();
                    if (newTitle && newTitle !== session.prompt) {
                        try {
                            const res = await fetch(`/sessions/${session.conversation_id}/title`, {
                                method: 'PUT',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ title: newTitle })
                            });
                            if (res.ok) {
                                session.prompt = newTitle;
                                selectBtn.innerText = newTitle;
                                selectBtn.setAttribute('aria-label', `Select session: ${newTitle}`);
                            } else {
                                console.error('Failed to save session title');
                            }
                        } catch (err) {
                            console.error('Failed to save session title:', err);
                        }
                    }
                    if (header.contains(input)) {
                        header.replaceChild(selectBtn, input);
                    }
                    actionContainer.style.display = 'flex';
                };
                
                input.addEventListener('keydown', (evt) => {
                    if (evt.key === 'Enter') {
                        saveTitle();
                    } else if (evt.key === 'Escape') {
                        if (header.contains(input)) {
                            header.replaceChild(selectBtn, input);
                        }
                        actionContainer.style.display = 'flex';
                    }
                });
                
                input.addEventListener('blur', () => {
                    saveTitle();
                });
            });

            deleteBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                
                const confirmDelete = confirm(`Are you sure you want to delete this session ("${session.prompt || 'Untitled Session'}")?`);
                if (!confirmDelete) return;
                
                try {
                    const res = await fetch(`/sessions/${session.conversation_id}`, {
                        method: 'DELETE'
                    });
                    if (res.ok) {
                        if (session.conversation_id === activeConversationId) {
                            newSession();
                        }
                        loadSessions();
                    } else {
                        alert('Failed to delete session');
                    }
                } catch (err) {
                    console.error('Failed to delete session:', err);
                    alert('Error deleting session');
                }
            });

            return item;
        }

        async function loadSessions() {
            try {
                const response = await fetch('/sessions');
                if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                const sessions = await response.json();
                
                sessionsList.innerHTML = '';
                if (sessions.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'session-meta';
                    empty.style.textAlign = 'center';
                    empty.style.padding = '20px 0';
                    empty.innerText = 'No sessions found.';
                    sessionsList.appendChild(empty);
                    return;
                }

                sessions.forEach(session => {
                    const item = renderSessionItem(session);
                    sessionsList.appendChild(item);
                });
            } catch (e) {
                console.error("Failed to load sessions list:", e);
            }
        }

        function renderWelcomeMessage() {
            chatHistory.innerHTML = '';
            const welcomeTextDiv = document.createElement('div');
            welcomeTextDiv.className = 'a2ui-text';
            welcomeTextDiv.innerText = 'System initialized. I am ready to monitor systems and analyze correlated telemetry. You can trigger an incident diagnostics report at any time.';
            const welcomeContainer = document.createElement('div');
            welcomeContainer.className = 'a2ui-container';
            welcomeContainer.appendChild(welcomeTextDiv);
            appendMessageRow('agent', welcomeContainer);
        }

        function newSession() {
            activeConversationId = null;
            document.querySelectorAll('.session-item').forEach(item => item.classList.remove('active'));
            renderWelcomeMessage();

            if (typeof toggleMobileSidebar === 'function') {
                toggleMobileSidebar(false);
            }

            // Clear sessionId param from the URL
            const url = new URL(window.location);
            if (url.searchParams.has('sessionId')) {
                url.searchParams.delete('sessionId');
                window.history.pushState({}, '', url);
            }
        }

        async function selectSession(conversationId, updateHistory = true) {
            activeConversationId = conversationId;
            
            if (typeof toggleMobileSidebar === 'function') {
                toggleMobileSidebar(false);
            }

            document.querySelectorAll('.session-item').forEach(item => {
                if (item.dataset.id === conversationId) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });

            if (updateHistory) {
                const url = new URL(window.location);
                if (url.searchParams.get('sessionId') !== conversationId) {
                    url.searchParams.set('sessionId', conversationId);
                    window.history.pushState({}, '', url);
                }
            }

            chatHistory.innerHTML = '';

            try {
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'a2ui-text';
                loadingDiv.style.color = 'var(--text-muted)';
                loadingDiv.innerText = 'Loading conversation history...';
                const loadingContainer = document.createElement('div');
                loadingContainer.className = 'a2ui-container';
                loadingContainer.appendChild(loadingDiv);
                appendMessageRow('agent', loadingContainer);

                const response = await fetch(`/sessions/${conversationId}/history`);
                if (!response.ok) throw new Error(`Failed to load history (${response.status})`);

                const data = await response.json();
                chatHistory.innerHTML = '';

                if (!data.history || data.history.length === 0) {
                    renderWelcomeMessage();
                    return;
                }

                let currentAgentBubbleInner = null;
                let currentThinkingBox = null;
                let currentThinkingContent = null;
                let currentTextStreamBox = null;

                data.history.forEach(step => {
                    if (step.source === "USER") {
                        currentAgentBubbleInner = null;

                        const userTextDiv = document.createElement('div');
                        userTextDiv.className = 'a2ui-text';
                        userTextDiv.innerText = step.content || "";
                        const userContainer = document.createElement('div');
                        userContainer.className = 'a2ui-container';
                        userContainer.appendChild(userTextDiv);
                        appendMessageRow('user', userContainer);
                    } else if (step.source === "MODEL") {
                        if (!currentAgentBubbleInner) {
                            currentAgentBubbleInner = document.createElement('div');
                            currentAgentBubbleInner.className = 'a2ui-container';

                            currentThinkingBox = document.createElement('div');
                            currentThinkingBox.className = 'agent-thinking-box';
                            currentThinkingBox.style.display = 'none';
                            
                            const thinkingTitle = document.createElement('div');
                            thinkingTitle.className = 'agent-thinking-title';
                            thinkingTitle.innerHTML = '<span>💭</span> <span>Thinking Process...</span>';
                            currentThinkingBox.appendChild(thinkingTitle);

                            currentThinkingContent = document.createElement('div');
                            currentThinkingBox.appendChild(currentThinkingContent);
                            currentAgentBubbleInner.appendChild(currentThinkingBox);

                            currentTextStreamBox = document.createElement('div');
                            currentTextStreamBox.className = 'agent-text-stream';
                            currentAgentBubbleInner.appendChild(currentTextStreamBox);

                            appendMessageRow('agent', currentAgentBubbleInner);
                        }

                        if (step.thinking) {
                            currentThinkingBox.style.display = 'block';
                            currentThinkingContent.innerText = step.thinking;
                        }

                        if (step.tool_calls && step.tool_calls.length > 0) {
                            currentThinkingBox.style.display = 'block';
                            step.tool_calls.forEach(call => {
                                let desc = `🔧 Calling tool '${call.name}'`;
                                if (call.args && Object.keys(call.args).length > 0) {
                                    desc += ` with arguments ${JSON.stringify(call.args)}`;
                                }
                                desc += "...\n✅ Tool completed.\n";
                                currentThinkingContent.innerText += desc;
                            });
                        }

                        if (step.response_a2ui) {
                            const a2uiDiv = renderA2UIContainer(step.response_a2ui);
                            currentTextStreamBox.innerHTML = '';
                            currentTextStreamBox.appendChild(a2uiDiv);
                        } else if (step.content) {
                            currentTextStreamBox.innerText = step.content;
                        }
                    }
                });

                chatHistory.scrollTop = chatHistory.scrollHeight;
            } catch (err) {
                chatHistory.innerHTML = '';
                const errTextDiv = document.createElement('div');
                errTextDiv.className = 'a2ui-text';
                errTextDiv.style.color = 'var(--danger)';
                errTextDiv.innerText = `Error loading history: ${err.message}`;
                const errContainer = document.createElement('div');
                errContainer.className = 'a2ui-container';
                errContainer.appendChild(errTextDiv);
                appendMessageRow('agent', errContainer);
            }
        }

        // Initialize session controls
        loadSessions().then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId');
            if (sessionId) {
                selectSession(sessionId, false);
            }
        });
        newSessionBtn.addEventListener('click', newSession);

        // Mobile Sidebar Controls
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const sidebar = document.querySelector('.sidebar');

        function toggleMobileSidebar(open) {
            if (open) {
                sidebar.classList.add('open');
                sidebarOverlay.classList.add('visible');
            } else {
                sidebar.classList.remove('open');
                sidebarOverlay.classList.remove('visible');
            }
        }

        sidebarToggle.addEventListener('click', () => toggleMobileSidebar(true));
        sidebarCloseBtn.addEventListener('click', () => toggleMobileSidebar(false));
        sidebarOverlay.addEventListener('click', () => toggleMobileSidebar(false));

        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sessionId = urlParams.get('sessionId');
            if (sessionId) {
                if (activeConversationId !== sessionId) {
                    selectSession(sessionId, false);
                }
            } else if (activeConversationId) {
                newSession();
            }
        });
    </script>
</body>
</html>
